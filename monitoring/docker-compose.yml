
# ShimonVault — On-prem monitoring stack
# Runs on proj-mgmt (always on, never destroyed)
#
# PostgreSQL replica has been MOVED to proj-ubuntu01 (100.87.141.40:5433)
# It is configured separately via scripts/setup_replica.sh
# This is the correct hybrid cloud architecture:
#   proj-mgmt    → monitoring (Prometheus, Grafana, Alertmanager, Portainer)
#   proj-ubuntu01 → data (NFS share + PostgreSQL read replica)

name: shimonvault

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: shimonvault-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
      - ./prometheus/rules:/etc/prometheus/rules:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    depends_on:
      - alertmanager

  grafana:
    image: grafana/grafana:11.6.15
    container_name: shimonvault-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    container_name: shimonvault-alertmanager
    restart: always
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    # Alertmanager can't read ${ENV} from its config file, so write the Slack
    # webhook URL to /tmp/slack_url at startup, then exec alertmanager. The
    # $$ keeps compose from expanding it — the container's shell does.
    entrypoint:
      - /bin/sh
      - -c
      - echo "$${SLACK_WEBHOOK_URL}" > /tmp/slack_url && exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/alertmanager --cluster.listen-address=

  node_exporter:
    image: prom/node-exporter:latest
    container_name: shimonvault-node-exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: shimonvault-cadvisor
    restart: always
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg

  telegram_relay:
    build: ./telegram_relay
    container_name: shimonvault-telegram-relay
    ports:
      - "8001:8001"
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    restart: always

  portainer:
    image: portainer/portainer-ce:latest
    container_name: shimonvault-portainer
    restart: always
    ports:
      - "9000:9000"
    environment:
      DOCKER_HOST: "tcp://100.76.126.126:2376"
    volumes:
      - portainer_data:/data
      - ./docker-certs/ca.pem:/certs/ca.pem:ro
      - ./docker-certs/client-cert.pem:/certs/cert.pem:ro
      - ./docker-certs/client-key.pem:/certs/key.pem:ro
    command: >
      --tlsverify
      --tlscacert=/certs/ca.pem
      --tlscert=/certs/cert.pem
      --tlskey=/certs/key.pem
      --host tcp://100.76.126.126:2376

volumes:
  prometheus_data:
  grafana_data:
  portainer_data:
