global:
  resolve_timeout: 5m
  # Alertmanager does NOT expand ${ENV} vars in this file. The compose entrypoint
  # writes the Slack webhook URL to /tmp/slack_url at startup; we read it here.
  slack_api_url_file: /tmp/slack_url

route:
  group_by: ["alertname", "instance", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "all-channels"

receivers:
  - name: "all-channels"
    slack_configs:
      - channel: '#shimonvault-alerts'
        send_resolved: true
        title: >-
          {{ if eq .Status "firing" -}}
          🚨 [ALERT] {{ .CommonAnnotations.summary }}
          {{- else -}}
          ✅ [RESOLVED] {{ .CommonAnnotations.summary }}
          {{- end }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Instance:* {{ .Labels.instance }}
          *Severity:* {{ .Labels.severity }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}
        icon_emoji: ":warning:"
        username: "ShimonVault Alertmanager"

    # Alertmanager has no native Telegram support, so we POST to the relay.
    # Host = the compose SERVICE name (telegram_relay, underscore) — NOT
    # "telegram-relay", which doesn't resolve.
    # Path = the route your relay.py serves. I built it as /telegram-relay.
    # Verify with the curl test in the chat; change the path if yours differs.
    webhook_configs:
      - url: "http://telegram_relay:8001/telegram-relay"
        send_resolved: true
        http_config:
          follow_redirects: true

inhibit_rules:
  - source_match:
      alertname: "NodeDown"
    target_match_re:
      alertname: "(HighCPU|HighMemory|FastAPIDown)"
    equal: ["instance"]
