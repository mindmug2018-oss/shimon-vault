# ─────────────────────────────────────────────────────────────
# Prometheus configuration
#
# Key design decision: EC2 service discovery instead of
# static IP addresses. IPs change every terraform apply, so
# we use AWS tags to find instances dynamically.
#
# Prometheus needs IAM permission ec2:DescribeInstances
# on the EC2 role attached to the instance running this.
# ─────────────────────────────────────────────────────────────

global:
  scrape_interval: 15s       # how often to collect metrics
  evaluation_interval: 15s   # how often to check alert rules
  scrape_timeout: 10s

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

# ─────────────────────────────────────────────
# Scrape jobs
# ─────────────────────────────────────────────

scrape_configs:

  # 1. This on-prem server's own node_exporter
  - job_name: "onprem-node"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          instance: "onprem-proj-mgmt"
          environment: "on-prem"

  # 2. This on-prem server's cAdvisor (Docker container metrics)
  - job_name: "onprem-cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "onprem-proj-mgmt"

  # 3. AWS EC2 instances — discovered dynamically by tags
  #    No IPs hardcoded here. Prometheus finds them via AWS API.
  - job_name: "ec2-nodes"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
        refresh_interval: 60s
        filters:
          - name: "tag:Project"
            values: ["shimonvault"]
          - name: "instance-state-name"
            values: ["running"]
    relabel_configs:
      # Use the EC2 Name tag as the "instance" label in Grafana
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      # Also capture the Role tag (bastion, app-blue, app-green)
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
      # Keep the private IP as a label for reference
      - source_labels: [__meta_ec2_private_ip]
        target_label: private_ip

  # 4. FastAPI app /metrics endpoint (added in Week 2)
  #    Prometheus FastAPI Instrumentator exposes this automatically
  - job_name: "fastapi-app"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8000
        refresh_interval: 60s
        filters:
          - name: "tag:Project"
            values: ["shimonvault"]
          - name: "tag:Role"
            values: ["app-blue", "app-green"]
          - name: "instance-state-name"
            values: ["running"]
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
