global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  - job_name: "onprem-node"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          instance: "onprem-proj-mgmt"
          environment: "on-prem"

  - job_name: "onprem-cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "onprem-proj-mgmt"

  - job_name: "ec2-nodes"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/ec2_nodes.json
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [instance]
        target_label: instance

  - job_name: "fastapi-app"
    # Uses Tailscale IP because proj-mgmt reaches EC2 via Tailscale mesh,
    # not the AWS private subnet. EC2 service discovery finds the private IP
    # (10.0.2.x) which is unreachable from proj-mgmt directly.
    # deploy.sh updates this IP automatically after each terraform apply.
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/fastapi_app.json
        refresh_interval: 30s
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [instance]
        target_label: instance
