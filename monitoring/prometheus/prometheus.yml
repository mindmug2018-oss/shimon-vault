global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:

  - job_name: "onprem-node"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          instance: "onprem-proj-mgmt"
          environment: "on-prem"

  - job_name: "onprem-cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          instance: "onprem-proj-mgmt"

  - job_name: "ec2-nodes"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9100
        refresh_interval: 60s
        filters:
          - name: "tag:Project"
            values: ["shimonvault"]
          - name: "instance-state-name"
            values: ["running"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
      - source_labels: [__meta_ec2_private_ip]
        target_label: private_ip

  - job_name: "fastapi-app"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8000
        refresh_interval: 60s
        filters:
          - name: "tag:Project"
            values: ["shimonvault"]
          - name: "tag:Role"
            values: ["app"]
          - name: "instance-state-name"
            values: ["running"]
    metrics_path: "/metrics"
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
