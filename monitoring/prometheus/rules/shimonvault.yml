groups:
  - name: shimonvault
    rules:
      - alert: HighCPU
        expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% (threshold: 80%)"

      - alert: HighMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% (threshold: 85%)"

      - alert: NodeDown
        expr: up{job="ec2-nodes"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "EC2 node down: {{ $labels.instance }}"
          description: "Node exporter on {{ $labels.instance }} has been unreachable for 1 minute"

      - alert: FastAPIDown
        expr: up{job="fastapi-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "FastAPI app down: {{ $labels.instance }}"
          description: "FastAPI /metrics endpoint on {{ $labels.instance }} is unreachable"
