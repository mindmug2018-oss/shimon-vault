name: CI — Lint, Test, Build

# Trigger: every push to any branch, and every pull request to main
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest   # GitHub-hosted x86_64 runner — free for public repos

    steps:
      # ── 1. Checkout code ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python 3.12 ───────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      # ── 3. Install app dependencies ─────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest pytest-cov flake8

      # ── 4. Lint with flake8 ─────────────────────────────────────────────────
      # Checks for syntax errors and obvious bugs.
      # --max-line-length=120: slightly relaxed (default is 79, too strict)
      # --extend-ignore=E501: ignore lines that are a tiny bit over
      - name: Lint with flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503 \
            --exclude=app/.venv,app/venv \
            --count --statistics
        continue-on-error: false   # lint failure blocks the pipeline

      # ── 5. Run tests ─────────────────────────────────────────────────────────
      # Tests run with SQLite in-memory — no real AWS needed in CI.
      # PYTHONPATH is set so tests can import from app/.
      - name: Run pytest
        env:
          PYTHONPATH: app
          # These dummy values satisfy config.py's _require() checks
          WRITE_DB_URL:              "sqlite:///./ci_test.db"
          READ_DB_URL:               "sqlite:///./ci_test.db"
          JWT_SECRET_KEY:            "ci-test-secret-key-do-not-use-in-production"
          S3_BUCKET_DOCS:            "ci-test-bucket-docs"
          S3_BUCKET_REPORTS:         "ci-test-bucket-reports"
          DYNAMODB_AUDIT_TABLE:      "ci-test-audit-log"
          DYNAMODB_INCIDENTS_TABLE:  "ci-test-incidents"
          DYNAMODB_MEETINGS_TABLE:   "ci-test-meetings"
          LAMBDA_BLOCK_IP_NAME:      "ci-test-block-ip"
          SNS_TOPIC_SECURITY_ARN:    "arn:aws:sns:us-east-1:000000000000:ci-test"
          SLACK_WEBHOOK_URL:         "https://hooks.slack.com/ci-test"
          TELEGRAM_BOT_TOKEN:        "000000000:ci-test-token"
          TELEGRAM_CHAT_ID:          "000000000"
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-fail-under=50    # fail if coverage drops below 50%

      # ── 6. Docker build check (no push) ─────────────────────────────────────
      # Verifies the Dockerfile is valid and the image builds successfully.
      # We don't push on CI — only the CD pipeline (cd.yml) pushes to Docker Hub.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: app/
          file: app/Dockerfile
          platforms: linux/amd64       # CI is x86_64; we only need one platform here
          push: false                  # NO push — this is just a build check
          tags: mindmug/shimonvault-app:ci-check
          cache-from: type=gha        # use GitHub Actions cache to speed up builds
          cache-to: type=gha,mode=max
